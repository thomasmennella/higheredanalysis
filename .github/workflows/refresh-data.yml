name: Refresh Canary data

# Pulls current 990 / ED data and commits data.json. Runs weekly and on demand.
on:
  schedule:
    - cron: '0 8 * * 1'        # Mondays 08:00 UTC
  workflow_dispatch: {}         # lets you run it manually from the Actions tab

permissions:
  contents: write               # needed to commit data.json back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas openpyxl xlrd

      - name: Build data.json
        env:
          SCORECARD_API_KEY: ${{ secrets.SCORECARD_API_KEY }}
        run: python scripts/build_data.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Refresh data.json [skip ci]"
          git push
